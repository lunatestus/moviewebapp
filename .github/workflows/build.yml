name: Build Android TV APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon --build-cache assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: alex-tv-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish/Update GitHub Release (debug-latest)
        uses: ncipollo/release-action@v1
        with:
          tag: debug-latest
          name: Debug APK (latest)
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: app/build/outputs/apk/debug/*.apk
